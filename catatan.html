<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<title>catatan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
    background:rgba(255,255,255,0.95);
    border-radius:25px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-group{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

#taskInput{
    flex:1;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#f1f5f9;
    outline:none;
    font-size:15px;
}

.btn-add{
    background:linear-gradient(135deg,#36d1dc,#5b86e5);
    color:white;
    border:none;
    padding:14px 18px;
    border-radius:15px;
    cursor:pointer;
}

.btn-delete-all{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
    color:white;
    cursor:pointer;
}

ul{
    list-style:none;
}

li{
    background:white;
    margin-bottom:12px;
    padding:15px;
    border-radius:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transition:.3s;
}

li:hover{
    transform:translateY(-2px);
}

.done-item{
    background:#dcfce7;
    border-left:5px solid #22c55e;
}

.task-row{
    display:flex;
    align-items:center;
    gap:12px;
}

.task-info{
    flex:1;
}

.task-title{
    font-weight:600;
    font-size:16px;
}

.completed{
    text-decoration:line-through;
    color:#16a34a;
}

.task-date{
    font-size:12px;
    color:#666;
    margin-top:4px;
}

.btn-delete{
    border:none;
    background:#ef4444;
    color:white;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
}

.btn-delete:hover{
    background:#dc2626;
}

input[type="checkbox"]{
    width:22px;
    height:22px;
    accent-color:#22c55e;
}

.empty{
    text-align:center;
    color:#777;
    padding:20px;
}

@media(max-width:600px){
    .input-group{
        flex-direction:column;
    }

    .btn-add{
        width:100%;
    }
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    width:90%;
    max-width:400px;
    border-radius:20px;
    padding:20px;
    animation:popup .3s ease;
}

@keyframes popup{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.close{
    font-size:28px;
    cursor:pointer;
}

.modal-content input{
    width:100%;
    padding:12px;
    border:none;
    background:#f1f5f9;
    border-radius:12px;
    outline:none;
    margin-bottom:15px;
}

.btn-save{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#36d1dc,#5b86e5);
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

    <h2><i class="fas fa-book-open"></i> Catatan Liburan</h2>

   <div class="input-group">
    <button class="btn-add" onclick="openModal()" style="width:100%;">
        <i class="fas fa-plus"></i> Tambah Catatan
    </button>
</div>

    <button class="btn-delete-all" onclick="deleteAll()">
        <i class="fas fa-trash-alt"></i> Hapus Semua
    </button>

    <ul id="taskList"></ul>

</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">

        <div class="modal-header">
            <h3>Tambah Catatan</h3>
            <span class="close" onclick="closeModal()">&times;</span>
        </div>

        <input type="text"
               id="taskInput"
               placeholder="Masukkan catatan...">

        <button class="btn-save" onclick="addTask()">
            Simpan
        </button>

    </div>
</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks(){

    const list = document.getElementById("taskList");
    list.innerHTML = "";

    if(tasks.length === 0){
        list.innerHTML = '<div class="empty">Belum ada tugas 📋</div>';
        return;
    }

    tasks.forEach((task,index)=>{

        const li = document.createElement("li");

        if(task.done){
            li.classList.add("done-item");
        }

        li.innerHTML = `
            <div class="task-row">

                <input
                    type="checkbox"
                    ${task.done ? "checked" : ""}
                    onchange="toggleTask(${index})">

                <div class="task-info">

                    <div class="task-title ${task.done ? 'completed' : ''}">
                        ${task.text}
                    </div>

                    <div class="task-date">
                        📅 ${task.hari}, ${task.tanggal}
                    </div>

                </div>

                <button class="btn-delete" onclick="deleteTask(${index})">
                    <i class="fas fa-trash"></i>   Hapus
                </button>

            </div>
        `;

        list.appendChild(li);
    });
}

function addTask(){

    const input = document.getElementById("taskInput");

    if(input.value.trim() === ""){
        alert("Masukkan tugas terlebih dahulu!");
        return;
    }

    const now = new Date();

    const hari = [
        "Minggu",
        "Senin",
        "Selasa",
        "Rabu",
        "Kamis",
        "Jumat",
        "Sabtu"
    ];

    tasks.push({
        text: input.value,
        done: false,
        hari: hari[now.getDay()],
        tanggal: now.toLocaleDateString("id-ID")
    });

    saveTasks();
    renderTasks();

    closeModal();
    input.value = "";
}

function toggleTask(index){
    tasks[index].done = !tasks[index].done;
    saveTasks();
    renderTasks();
}

function deleteTask(index){
    tasks.splice(index,1);
    saveTasks();
    renderTasks();
}

function deleteAll(){

    if(confirm("Yakin ingin menghapus semua tugas?")){
        tasks = [];
        localStorage.removeItem("tasks");
        renderTasks();
    }

}

document.getElementById("taskInput").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        addTask();
    }
});

renderTasks();


function openModal(){
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
